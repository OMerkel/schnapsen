name: CI

on:
  push:
    branches:
      - "**"
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: javascript/html5/package-lock.json

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install JS dependencies
        working-directory: javascript/html5
        run: npm ci

      - name: Run JS quality checks
        working-directory: javascript/html5
        run: npm run ci

      - name: Run SVG generator regression checks
        run: python -m unittest javascript/html5/src/img/deck/test_svg_generators.py
